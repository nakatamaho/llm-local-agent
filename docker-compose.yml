# docker-compose.yml
# Offline LLM coding agent stack: llama-server + aider
# Network: internal-only (no internet access from containers)
# Tested: Docker Compose v2.x, NVIDIA Container Toolkit >= 1.14

name: llm-local-agent

networks:
  llm-internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  models:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PROJECT_ROOT:-.}/models

  workspace:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${WORKSPACE_PATH:-./workspace}

  logs-inference:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PROJECT_ROOT:-.}/logs/inference

  logs-agent:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PROJECT_ROOT:-.}/logs/agent

  webui-data:   # added here, in the single volumes section

services:
  # ── Inference server (llama.cpp with CUDA) ──────────────────────────────
  inference:
    build:
      context: .
      dockerfile: Dockerfile.inference
      args:
        LLAMA_CPP_VERSION: ${LLAMA_CPP_VERSION:-b5576}
    image: llm-local-agent/inference:${LLAMA_CPP_VERSION:-b5576}
    container_name: llm-inference
    restart: unless-stopped

    networks:
      llm-internal:
        ipv4_address: 172.30.0.10

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]

    volumes:
      - models:/models:ro
      - logs-inference:/var/log/llm

    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - LLAMA_CTX_SIZE=${LLAMA_CTX_SIZE:-65536}

    command: >
      --model /models/${MODEL_FILE:-Qwen3.5-35B-A3B-Q4_K_M.gguf}
      --host 0.0.0.0
      --port 8080
      -ngl 99
      --ctx-size ${LLAMA_CTX_SIZE:-65536}
      --batch-size ${LLAMA_BATCH_SIZE:-512}
      --ubatch-size 256
      --n-predict -1
      --threads 8
      --flash-attn on
      --cache-type-k q8_0
      --cache-type-v q8_0
      --temp ${LLM_TEMPERATURE:-0.6}
      --top-p ${LLM_TOP_P:-0.95}
      --min-p 0.0
      --repeat-penalty 1.0
      --no-mmap
      --log-file /var/log/llm/server.log

    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp:size=512m

    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
        compress: "true"

  # ── Agent CLI (aider) ────────────────────────────────────────────────────
  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
      args:
        AIDER_VERSION: ${AIDER_VERSION:-0.85.2}
    image: llm-local-agent/agent:${AIDER_VERSION:-0.85.2}
    container_name: llm-agent
    restart: "no"

    depends_on:
      inference:
        condition: service_healthy

    networks:
      llm-internal:
        ipv4_address: 172.30.0.20

    volumes:
      - workspace:/workspace:rw
      - logs-agent:/home/agentuser/.aider/logs:rw
      - ./config/aider.conf.yml:/home/agentuser/.aider.conf.yml:ro

    environment:
      - OPENAI_API_BASE=http://172.30.0.10:8080/v1
      - OPENAI_API_KEY=dummy-local-no-auth
      - AIDER_MODEL=openai/${AIDER_MODEL_NAME:-Qwen3.5-35B-A3B}
      - AIDER_NO_AUTO_COMMITS=${AIDER_NO_AUTO_COMMITS:-false}
      - AIDER_DARK_MODE=true
      - AIDER_PRETTY=true
      - GIT_AUTHOR_NAME=aider-bot
      - GIT_AUTHOR_EMAIL=bot@local

    working_dir: /workspace
    stdin_open: true
    tty: true

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ── Web UI (Open WebUI) ──────────────────────────────────────────────────
  webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: llm-webui
    restart: unless-stopped

    networks:
      llm-internal:
        ipv4_address: 172.30.0.30

    ports:
      - "3000:8080"

    volumes:
      - webui-data:/app/backend/data   # persistent storage for webui settings

    environment:
      - OPENAI_API_BASE_URL=http://172.30.0.10:8080/v1
      - OPENAI_API_KEY=dummy
      - WEBUI_AUTH=false
      - WEBUI_NAME=Local Qwen3.5
